<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Pi Sensor System</title>
  </head>
  <body>
    <h1>This is a test!</h1>
    <p id="pressure"></p>
    <p id="temperature"></p>
    <canvas id="temperatureChart" width="800" height="400"></canvas>
  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- For adapting dates - due to chart.js not working? -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script type="text/javascript">


  const tempcanvas=document.getElementById('temperatureChart').getContext('2d');
  const tempchart = new Chart(tempcanvas, {
    type: 'scatter',
    data: {
      labels: [],
      datasets: [{
        label: 'Temperature (°C)',
        borderColor:'black',
        backgroundColor: 'rgba(255,0,0,0.1)',
        data: [],
        }
      ]
    },
    options: {
      animation: false,
      scales: {
        x: {
          type: 'time',
          time: {unit: 'minute'},
          displayFormats:{
            minute: 'PPp'
          },
          title: {display: true, text: 'Time'}
        },
        y: {beginAtZero: false}
      }
    }
  });


    async function loadHistory(){
      try{
        const result = await fetch("/sensor/history?limit=50");
        const data = await result.json();

        if(data && data.length>0){

          document.getElementById('pressure').textContent = data[0].Pressure.toFixed(2);
          document.getElementById('temperature').textContent = data[0].Temperature.toFixed(2);
          console.log("rds:", data[0].DateTime);
          const tempChartData = data.map(row => ({

            x: new Date(row.DateTime),
            y: row.Temperature
          })).filter(p =>!isNaN(p.x.getTime()));

          tempchart.data.datasets[0].data = tempChartData
          console.log(tempchart.data.labels);
          console.log("Chart Data:", tempchart.data.datasets[0].data);
          tempchart.update();
        }
      } catch (exception){
        console.error("Could not load history! :",exception);
      }
    }
    window.onload=loadHistory;
</script>
