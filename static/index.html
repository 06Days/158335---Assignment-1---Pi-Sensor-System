<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Pi Sensor System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  </head>
  <body class="bg-light">
    <div class="d-flex align-items-center gap-2 mb-2">
    <span id="trendBadge" class="badge bg-secondary">Loading temperature trend</span>
    <span id="spikeBadge" class="badge bg-danger d-none">Spike detected!</span>
    </div>
    <small id="predictionText" class="text-muted d-block mb-3">
        Calculating prediction...
    </small>
    <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#settingsModal">Configuration</button>
   <div class="container py-4">

     <div class="mb-4 d-flex justify-content-center">
       <div class="btn-group btn-group-toggle" data-bs-toggle="buttons" id="timeRangeGroup">
         <label class="btn btn-outline-primary"><input type="radio" name="timeRange" id="range1" value="1" autocomplete="off">1 min</label>
         <label class="btn btn-outline-primary active"><input type="radio" name="timeRange" id="range10" value="10" autocomplete="off" checked>10 min</label>
         <label class="btn btn-outline-primary"><input type="radio" name="timeRange" id="range70" value="60" autocomplete="off">1 hr</label>
         <label class="btn btn-outline-primary"><input type="radio" name="timeRange" id="range1440" value="1440" autocomplete="off">1d</label>
       </div>
     </div>
     <div class="row mb-4">
       <div class="col-md-4 text-center">
         <h4>Pressure</h4>
         <p id="pressure" class="display-6">hPa</p>
       </div>
     </div>
     <div class="row mb-4">
       <div class="col-md-4 text-center">
         <h4>Temperature</h4>
         <p id="temperature" class="display-6">℃</p>
       </div>
     </div>
     <div class="row mb-4">
       <div class="col-md-4 text-center">
         <h4>Humidity</h4>
         <p id="humidity" class="display-6">%</p>
       </div>
     </div>
     <!-- charts -->
     <div class="row g-4">
       <div class="col-md-4">
         <canvas id="temperatureChart"></canvas>
       </div>
       <div class="col-md-4">
         <canvas id="humidityChart"></canvas>
       </div>
       <div class="col-md-4">
         <canvas id="pressureChart"></canvas>
       </div>
     </div>
   </div>

   <!-- settings modal -->
   <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
     <div class="modal-dialog">
       <div class="modal-content">
         <h5 class="modal-title" id="settingsModalLabel">Sensor System Settings</h5>
         <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form class="settingsForm">
          <div class="mb-3">
            <label for="refreshInterval" class="form-label">Interface refresh interval</label>
            <input type="number" class="form-control" id="refreshInterval" value="1" min="1">
          </div>
          <div class="mb-3">
            <label for="TempAlertThreshold" class="form-label">Temperature Alert Threshold</label>
            <input type="number" class="form-control" id="TempAlertThreshold" value="1" min="1">
          </div>
          <div class="mb-3">
            <label for="PressureAlertThreshold" class="form-label">Pressure Alert Threshold</label>
            <input type="number" class="form-control" id="PressureAlertThreshold" value="1" min="1">
          </div>
          <div class="mb-3">
            <label for="HumidityAlertThreshold" class="form-label">Humidity Alert Threshold</label>
            <input type="number" class="form-control" id="HumidityAlertThreshold" value="1" min="1">
          </div>

        </form>
      </div>



       </div>

     </div>

   </div>
 </body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

      <div class="row mb-4">
        <div class="col-md-4 text-center">
          <h4>Temperature</h4>
          <p id="temperature" class="display-6"></p>
        </div>
      </div>
      <div class="row mb-4">
        <div class="col-md-4 text-center">
          <h4>Humidity</h4>
          <p id="humidity" class="display-6"></p>
        </div>
      </div>
      <!-- charts -->
      <div class="row g-4">
        <div class="col-md-4">
          <canvas id="temperatureChart"></canvas>
        </div>
        <div class="col-md-4">
          <canvas id="humidityChart"></canvas>
        </div>
        <div class="col-md-4">
          <canvas id="pressureChart"></canvas>
        </div>
      </div>
    </div>

  </body>


<!-- external import of index.js -->
<script src="/static/js/index.js "type="text/javascript"></script>

</html>
