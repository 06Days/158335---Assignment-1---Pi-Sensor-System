<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Pi Sensor System</title>
  </head>
  <body>
    <h1>This is a test!</h1>
    <p id="pressure"></p>
    <p id="temperature"></p>
    <canvas id="temperatureChart" width="800" height="400"></canvas>
  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="text/javascript">
  const tempcanvas=document.getElementById('temperatureChart').getContext('2d');
  const tempchart = new Chart(tempcanvas, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Temperature (°C)',
        borderColor:'black',
        backgroundColor: 'rgba(255,0,0,0.1)',
        data: [],
        }
      ]
    },
    options: {
      animation: false,
      scales: {
        x: {
          type: 'time',
          time: {unit: 'second'},
          title: {display: true, text: 'Time'}
        },
        y: {beginAtZero: true}
      }
    }
  });
  // Keeps the chart within the last minute (temporary)
  function pruneChart(){
    const now = Date.now();
    chart.data.labels = chart.data.labels.filter(t=> now - t <=60000);
    chart.data.datasets.forEach(ds => {
      ds.data = ds.data.filter((_,i)=> now - chart.data.labels[i] <= 60000);
    });
    chart.update();
  }
  // a feed from the backend to update the chart as data is brought!
  const eventSource = new EventSource('sensor/stream');
  eventSource.onmessage = function (event){
    const message = JSON.parse(e.event);
    const timestamp = new Date(msg.timestamp * 1000);

    chart.data.labels.push(timestamp);
    chart.data.datasets[0].data.push(message.temperature_c);

    pruneChart();
  };

    async function test_data(){
      try{
        const res = await fetch('/sensor');
        const data = await res.json();
        document.getElementById('pressure').textContent = data.pressure_hpa.toFixed(2);
        document.getElementById('temperature').textContent = data.temperature_c.toFixed(2);
      } catch (e){
        console.error(e);
      }
      setTimeout(poll,1000);
    }
    window.onload=test_data;
</script>
