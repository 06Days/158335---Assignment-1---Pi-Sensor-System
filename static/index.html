<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Pi Sensor System</title>
  </head>
  <body>
    <h1>This is a test!</h1>
    <p id="pressure"></p>
    <p id="temperature"></p>
    <canvas id="temperatureChart" width="800" height="400"></canvas>
  </body>
</html>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="text/javascript">


  const tempcanvas=document.getElementById('temperatureChart').getContext('2d');
  const tempchart = new Chart(tempcanvas, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Temperature (°C)',
        borderColor:'black',
        backgroundColor: 'rgba(255,0,0,0.1)',
        data: [],
        }
      ]
    },
    options: {
      animation: false,
      scales: {
        x: {
          type: 'time',
          time: {unit: 'second'},
          title: {display: true, text: 'Time'}
        },
        y: {beginAtZero: false}
      }
    }
  });


    async function loadHistory(){
      try{
        const result = await fetch("/sensor/history?limit=50");
        const data = await result.json();

        if(data.length>0){
          const latest=data[0];
          document.getElementById('pressure').textContent = latest.Pressure.toFixed(2);
          document.getElementById('temperature').textContent = latest.Temperature.toFixed(2);

          const chronologicalData = data.reverse();

          tempchart.data.labels=chronologicalData.map(row = new Date(row.DateTime));
          tempchart.data.datasets[0].data = chronologicalData.map(row => row.Temperature);
          tempchart.update();
        }
      } catch (exception){
        console.error("Could not load history! :",exception);
      }
    }
    window.onload=loadHistory;
</script>
