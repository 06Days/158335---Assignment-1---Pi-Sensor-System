<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pi Sensor System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Pi Sensor System</span>
            <button type="button" class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#settingsModal">
                Configuration
            </button>
        </div>
    </nav>

    <div class="container">
        <div id="alertContainer" class="mb-3"></div>
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card h-100 shadow-sm sensor-card">
                    <div class="card-body text-center">
                        <h6 class="text-muted text-uppercase">Temperature</h6>
                        <p id="temperature" class="display-5 fw-bold mb-1">-- ℃</p>
                        <div class="d-flex justify-content-center gap-1">
                            <span id="tempTrend" class="badge bg-secondary">Stable</span>
                            <span id="tempPrediction" class="badge bg-light text-dark border d-none"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm sensor-card">
                    <div class="card-body text-center">
                        <h6 class="text-muted text-uppercase">Humidity</h6>
                        <p id="humidity" class="display-5 fw-bold mb-1">-- %</p>
                        <div class="d-flex justify-content-center gap-1">
                            <span id="humidTrend" class="badge bg-secondary">Stable</span>
                            <span id="humidPrediction" class="badge bg-light text-dark border d-none"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100 shadow-sm sensor-card">
                    <div class="card-body text-center">
                        <h6 class="text-muted text-uppercase">Air Pressure</h6>
                        <p id="pressure" class="display-5 fw-bold mb-1">-- hPa</p>
                        <div class="d-flex justify-content-center gap-1">
                            <span id="pressTrend" class="badge bg-secondary">Stable</span>
                            <span id="pressPrediction" class="badge bg-light text-dark border d-none"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center mb-4">
            <div class="btn-group" role="group" id="timeRangeGroup">
                <input type="radio" class="btn-check" name="timeRange" id="range1" value="1" autocomplete="off">
                <label class="btn btn-outline-primary" for="range1">1 min</label>

                <input type="radio" class="btn-check" name="timeRange" id="range10" value="10" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="range10">10 min</label>

                <input type="radio" class="btn-check" name="timeRange" id="range60" value="60" autocomplete="off">
                <label class="btn btn-outline-primary" for="range60">1 hr</label>

                <input type="radio" class="btn-check" name="timeRange" id="range1440" value="1440" autocomplete="off">
                <label class="btn btn-outline-primary" for="range1440">1 day</label>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card shadow-sm p-2"><canvas id="temperatureChart"></canvas></div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow-sm p-2"><canvas id="humidityChart"></canvas></div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow-sm p-2"><canvas id="pressureChart"></canvas></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">System Configuration</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                  <div class="mb-4">

                    <form id="settingsForm">
                        <div class="mb-3">
                            <label class="form-label">Update Interval (seconds)</label>
                            <input type="number" class="form-control" id="refreshInterval" value="1" min="1">
                        </div>
                        <hr>
                        <label class="form-label">Temperature Range (°C)</label>
                        <div id="tempSlider" class="mx-2 mb-2"></div>
                        <small class="text-muted">Range: <span id="tempRangeText">0 - 40</span></small>

                        <div class="mb-4">
                            <label class="form-label">Humidity Range (%)</label>
                            <div id="humidSlider" class="mx-2 mb-2"></div>
                            <small class="text-muted">Range: <span id="humidRangeText">10 - 90</span></small>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Pressure Range (hPa)</label>
                            <div id="pressSlider" class="mx-2 mb-2"></div>
                            <small class="text-muted">Range: <span id="pressRangeText">10 - 90</span></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Temp Spike Sensitivity (°C change)</label>
                            <input type="number" class="form-control" id="temp_spike_amount" step="0.1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Humidity Spike Sensitivity (% change)</label>
                            <input type="number" class="form-control" id="humid_spike_amount" step="0.1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pressure Spike Sensitivity (hPa change)</label>
                            <input type="number" class="form-control" id="press_spike_amount" step="0.1">
                        </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveSettings()">Apply Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <script src="/static/js/index.js" type="text/javascript"></script>
</body>
</html>
