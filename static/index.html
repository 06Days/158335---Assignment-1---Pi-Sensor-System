<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Pi Sensor System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="bg-light">
   <div class="container py-4">

     <div class="mb-4 d-flex justify-content-center">
       <div class="btn-group btn-group-toggle" data-bs-toggle="buttons">
         <label class="btn btn-outline-primary active"><input type="radio" name="timeRange" id="range10" autocomplete="off" checked>10 min</label>
         <label class="btn btn-outline-primary"><input type="radio" name="timeRange" id="range70" autocomplete="off" checked>1 hr</label>
         <label class="btn btn-outline-primary"><input type="radio" name="timeRange" id="range1440" autocomplete="off" checked>1d</label>
       </div>
     </div>
     <div class="row mb-4">
       <div class="col-md-4 text-center">
         <h4>Pressure</h4>
         <p id="pressure" class="display-6">hPa</p>
       </div>
     </div>
     <div class="row mb-4">
       <div class="col-md-4 text-center">
         <h4>Temperature</h4>
         <p id="temperature" class="display-6">℃</p>
       </div>
     </div>
     <div class="row mb-4">
       <div class="col-md-4 text-center">
         <h4>Humidity</h4>
         <p id="humidity" class="display-6">%</p>
       </div>
     </div>
     <!-- charts -->
     <div class="row g-4">
       <div class="col-md-4">
         <canvas id="temperatureChart"></canvas>
       </div>
       <div class="col-md-4">
         <canvas id="humidityChart"></canvas>
       </div>
       <div class="col-md-4">
         <canvas id="pressureChart"></canvas>
       </div>
     </div>
   </div>

 </body>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- For adapting dates - due to chart.js not working? -->
<script type="text/javascript">
  const tempcanvas=document.getElementById('temperatureChart').getContext('2d');
  const humidcanvas=document.getElementById('humidityChart').getContext('2d');
  const pressurecanvas=document.getElementById('pressureChart').getContext('2d');

  const tempchart = new Chart(tempcanvas, {
    type: 'scatter',
    data: {
      labels: [],
      datasets: [{
        label: 'Temperature (°C)',
        borderColor:'black',
        backgroundColor: 'rgba(255,0,0,0.1)',
        data: [],
        }
      ]
    },
    options: {
      animation: true,
      scales: {
        x: {
          type: 'time',
          time: {unit: 'minute'},
          ticks:{
            // invasive but hopefully will work
            callback: function(value, index, values){
              return new Date(value).toLocaleTimeString([],{
                hour:'2-digit',
                minute:'2-digit'
            });
            }
          },
          displayFormats:{
            minute: 'HH:mm'
          },
          title: {display: true, text: 'Time'}
        },
        y: {beginAtZero: false}
      }
    }});
  const humidchart = new Chart(humidcanvas, {
    type: 'scatter',
    data: {
      labels: [],
      datasets: [{
        label: 'Humidity (%)',
        borderColor:'black',
        backgroundColor: 'rgba(255,0,0,0.1)',
        data: [],
        }
      ]
    },
    options: {
      animation: true,
      scales: {
        x: {
          type: 'time',
          time: {unit: 'minute'},
          ticks:{
            // invasive but hopefully will work
            callback: function(value, index, values){
              return new Date(value).toLocaleTimeString([],{
                hour:'2-digit',
                minute:'2-digit'
            });
            }
          },
          displayFormats:{
            minute: 'HH:mm'
          },
          title: {display: true, text: 'Time'}
        },
        y: {beginAtZero: false}
      }
    }});
  const pressurechart = new Chart(pressurecanvas, {
      type: 'scatter',
      data: {
        labels: [],
        datasets: [{
          label: 'Air Pressure (hPa)',
          borderColor:'black',
          backgroundColor: 'rgba(0,255,0,0.1)',
          data: [],
          }
        ]
      },
      options: {
        animation: true,
        scales: {
          x: {
            type: 'time',
            time: {unit: 'minute'},
            ticks:{
              // invasive but hopefully will work
              callback: function(value, index, values){
                return new Date(value).toLocaleTimeString([],{
                  hour:'2-digit',
                  minute:'2-digit'
              });
              }
            },
            displayFormats:{
              minute: 'HH:mm'
            },
            title: {display: true, text: 'Time'}
          },
          y: {beginAtZero: false}
        }
      }});

  async function loadHistory(){
    try{
      const result = await fetch("/sensor/history?limit=50");
      const data = await result.json();

      if(data && data.length>0){

        document.getElementById('pressure').textContent = data[0].Pressure.toFixed(2);
        document.getElementById('temperature').textContent = data[0].Temperature.toFixed(2);
        document.getElementById('humidity').textContent = data[0].Humidity.toFixed(2);
        console.log("rds:", data[0].DateTime);
        const tempChartData = data.map(row => ({

          x: new Date(row.DateTime),
          y: row.Temperature
        })).filter(p =>!isNaN(p.x.getTime()));
        const humidChartData = data.map(row => ({

          x: new Date(row.DateTime),
          y: row.Humidity
        })).filter(p =>!isNaN(p.x.getTime()));
        const pressureChartData = data.map(row => ({

          x: new Date(row.DateTime),
          y: row.Pressure
        })).filter(p =>!isNaN(p.x.getTime()));

        tempchart.data.datasets[0].data = tempChartData.reverse();
        tempchart.update();

        humidchart.data.datasets[0].data = humidChartData.reverse();
        humidchart.update();

        humidchart.data.datasets[0].data = pressureChartData.reverse();
        pressurechart.update();
      }
    } catch (exception){
      console.error("Could not load history! :",exception);

    }
  }
  window.onload=()=>{

    loadHistory();
    setInterval(loadHistory,10000);
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
